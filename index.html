<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
       
       html, body{
        height: 100%;
        width: 100%;
        align-items: center;
     
       }

       body{
       display: flex;
        align-items: center;
       padding-left: 500px;
       }

       .box{

        height: 150px;
        width: 150px;
        background-color: rgb(168, 166, 166);
         border-radius: 100%;
            border: grey solid 5px;
            border-right: rgb(235, 141, 157) solid 5px;

       }

       .box{
        animation: load 2s infinite
       }

       @keyframes load{

        0%{
           transform: rotate(0deg);
            

        }

        100%{
           transform: rotate(360deg);

        }
    

       }

     
    </style>
</head>

<body>
    <div class="box"></div>
</body>

</html>
